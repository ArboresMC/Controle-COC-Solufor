{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solufor Soluções Florestais</title>

  <style>
:root {
  --bg: #f5f7fb;
  --panel: #ffffff;
  --panel-soft: #f8fafc;

  --text: #0f172a;
  --muted: #64748b;
  --line: #dbe2ea;

  --primary: #111827;
  --primary-2: #000000;
  --primary-soft: #e5e7eb;

  --premium-gold: #c9a227;
  --premium-dark: #0b1220;

  --warning: #b45309;
  --warning-soft: #fff3d9;
  --danger: #b42318;
  --danger-soft: #feeceb;
  --success: #0f766e;
  --success-soft: #e7f7f5;

  --shadow: 0 14px 36px rgba(15, 23, 42, 0.10);
  --radius: 18px;
}

body {
  font-family: Inter, sans-serif;
  background: linear-gradient(180deg, #e8ecf3 0%, var(--bg) 220px);
  color: var(--text);
  margin: 0;
}

.topbar {
  background: rgba(11, 18, 32, 0.92);
  color: white;
  border-bottom: 1px solid rgba(255,255,255,.08);
}

.brand-badge {
  background: linear-gradient(135deg, var(--premium-gold), #8a6a14);
}

.hero {
  background: linear-gradient(135deg, var(--premium-dark), #1f2937, #334155);
  color: white;
}

.card {
  border: 1px solid rgba(15, 23, 42, .08);
}

.metric-card::after {
  background: rgba(201,162,39,.10);
}

.btn {
  background: var(--primary);
  box-shadow: 0 10px 24px rgba(15,23,42,.18);
}

input:focus, select:focus, textarea:focus {
  outline: 2px solid rgba(201,162,39,.18);
  border-color: var(--premium-gold);
}

.nav-pill {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.10);
}

.nav-pill:hover {
  background: rgba(255,255,255,.14);
}

.login-hero {
  background: linear-gradient(135deg, var(--premium-dark), #1e293b, #334155);
}
  </style>
</head>

<body>
<div class="app-shell">

  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">
        <div class="brand-badge">S</div>
        <div class="brand-copy">
          <strong>Solufor</strong>
          <span>Controle FSC</span>
        </div>
      </a>

      {% if user.is_authenticated %}
      <div class="userbox">
        <strong>{{ user.username }}</strong>
        <span>{{ user.get_role_display }}</span>
      </div>
      {% endif %}
    </div>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

</div>
</body>
</html>
