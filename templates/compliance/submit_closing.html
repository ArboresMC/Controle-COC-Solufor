{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:720px;">
  <h1>Enviar fechamento do mês</h1>
  <p><strong>Competência:</strong> {{ closing.month }}/{{ closing.year }}</p>
  <p><strong>Status atual:</strong> {{ closing.get_status_display }}</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Enviar fechamento</button>
  </form>
</div>
{% endblock %}
