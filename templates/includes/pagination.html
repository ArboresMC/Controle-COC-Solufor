{% if page_obj and page_obj.paginator.num_pages > 1 %}
<nav class="pagination-bar" aria-label="Paginação">
  <div class="pagination-summary">Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</div>
  <div class="pagination-links">
    {% if page_obj.has_previous %}
      <a class="btn secondary" href="?{% if query_string %}{{ query_string }}&{% endif %}{{ page_param|default:'page' }}=1">Primeira</a>
      <a class="btn secondary" href="?{% if query_string %}{{ query_string }}&{% endif %}{{ page_param|default:'page' }}={{ page_obj.previous_page_number }}">Anterior</a>
    {% endif %}
    {% if page_obj.has_next %}
      <a class="btn secondary" href="?{% if query_string %}{{ query_string }}&{% endif %}{{ page_param|default:'page' }}={{ page_obj.next_page_number }}">Próxima</a>
      <a class="btn secondary" href="?{% if query_string %}{{ query_string }}&{% endif %}{{ page_param|default:'page' }}={{ page_obj.paginator.num_pages }}">Última</a>
    {% endif %}
  </div>
</nav>
{% endif %}
