{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="actions" style="justify-content:space-between;align-items:center;">
    <h1>Clientes e fornecedores</h1>
    <a class="btn" href="/catalog/counterparties/new/">Novo cadastro</a>
  </div>
  <table>
    <tr><th>Nome</th><th>Documento</th><th>Tipo</th><th>Participante</th><th></th></tr>
    {% for c in counterparties %}
    <tr><td>{{ c.name }}</td><td>{{ c.document_id }}</td><td>{{ c.get_type_display }}</td><td>{{ c.participant|default:'-' }}</td><td><a href="/catalog/counterparties/{{ c.id }}/edit/">Editar</a></td></tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
