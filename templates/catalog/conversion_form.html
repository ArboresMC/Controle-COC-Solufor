{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:760px;">
  <h1>{% if form.instance.pk %}Editar{% else %}Nova{% endif %} conversão de unidade</h1>
  <p class="muted">Exemplo: para transformar tonelada em m³, informe origem = t, destino = m³ e o fator correspondente.</p>
  <form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn" type="submit">Salvar</button></form>
</div>
{% endblock %}
