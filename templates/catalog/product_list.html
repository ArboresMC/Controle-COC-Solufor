{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="actions" style="justify-content:space-between;align-items:center;">
    <h1>Produtos</h1>
    <a class="btn" href="/catalog/products/new/">Novo produto</a>
  </div>
  <table>
    <tr><th>Produto</th><th>Categoria</th><th>Unidade</th><th>Declaração padrão</th><th>Ativo</th><th></th></tr>
    {% for p in products %}
    <tr><td>{{ p.name }}</td><td>{{ p.category }}</td><td>{{ p.unit }}</td><td>{{ p.default_claim }}</td><td>{{ p.active|yesno:"Sim,Não" }}</td><td><a href="/catalog/products/{{ p.id }}/edit/">Editar</a></td></tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
