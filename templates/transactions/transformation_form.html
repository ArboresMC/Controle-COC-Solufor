{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:760px;">
  <h1>{% if form.instance.pk %}Editar{% else %}Nova{% endif %} transformação</h1>
  <p class="muted">A transformação consome saldo do produto de origem e gera saldo do produto destino usando o fator de rendimento cadastrado.</p>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Salvar transformação</button>
  </form>
</div>
{% endblock %}
