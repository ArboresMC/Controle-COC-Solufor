{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:720px;">
  <h1>{% if form.instance.pk %}Editar{% else %}Novo{% endif %} lançamento</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Salvar</button>
  </form>
</div>
{% endblock %}
