services:
  - type: web
    name: portal-fsc
    env: python
    plan: starter
   services:
  - type: web
    name: portal-fsc
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    preDeployCommand: python manage.py shell -c "from django.contrib.auth import get_user_model; User=get_user_model(); User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin','admin@email.com','12345678')"
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: portal-fsc.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://portal-fsc.onrender.com
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: portal-fsc-db
          property: connectionString

databases:
  - name: portal-fsc-db
    plan: starter
